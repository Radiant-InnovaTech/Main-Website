# Radiant Nexus — Nginx Configuration
# /etc/nginx/sites-available/radiant-nexus
#
# After SSL is provisioned with Certbot, the http → https redirect
# and ssl_certificate directives will be added automatically by certbot.

server {
    listen 80;
    listen [::]:80;
    server_name radiantinnovatech.com www.radiantinnovatech.com;

    # Static website root (all HTML/CSS/JS/assets)
    root /var/www/radiant-nexus/public;
    index index.html;

    # ── API → Node.js backend on port 3000 ───────────────────
    location /api/ {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;

        # Timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # Don't buffer large uploads
        proxy_request_buffering off;
        client_max_body_size    2m;
    }

    # ── SPA-style routing for static pages ───────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Gzip compression ──────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    # ── Cache headers for static assets ──────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                        always;
    add_header X-XSS-Protection        "1; mode=block"                     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy      "geolocation=(), microphone=()"      always;

    # ── Block access to hidden/sensitive files ────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~* \.(env|log|db|sql)$ {
        deny all;
        return 404;
    }

    # ── Deny direct backend access (only Nginx should talk to it) ─
    location = /api/health {
        # Allow health checks from localhost and Nginx
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
